<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inaya's Birthday Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">

    <header>
      <div class="star-icon">✦</div>
      <h1>Inaya</h1>
      <p class="subtitle">Born August 5, 2025 &middot; 1:50 AM</p>
    </header>

    <div class="cards">

      <div class="card card--highlight" id="monthly-card">
        <div class="card-label">Monthly Milestone</div>
        <p class="counter counter--milestone" id="monthly-bday-counter">Loading...</p>
      </div>

      <div class="card-row">
        <div class="card" id="days-card">
          <div class="card-label">Days Old</div>
          <p class="counter" id="days-counter">0</p>
        </div>
        <div class="card" id="weeks-card">
          <div class="card-label">Weeks &amp; Days</div>
          <p class="counter counter--sm" id="weeks-counter">0w 0d</p>
        </div>
      </div>

      <div class="card" id="months-card">
        <div class="card-label">True Age</div>
        <p class="counter counter--sm" id="months-counter">0 months 0 days</p>
      </div>

      <div class="card card--timer" id="timer-card">
        <div class="card-label">Next Monthly Birthday</div>
        <p class="counter counter--mono" id="timer-counter">Loading...</p>
      </div>

      <div class="card-row">
        <div class="card" id="progress-card">
          <div class="card-label">Month Progress</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
          </div>
          <p class="progress-label" id="progress-label">Loading...</p>
        </div>

        <div class="card card--countries" id="countries-card">
          <div class="card-label">Countries ✈</div>
          <div class="countries-list" id="countries-list"></div>
          <p class="countries-count" id="countries-count">1 country</p>
        </div>
      </div>

    </div>

    <footer>
      <p>Made with love &middot; For our Inaya ✦</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
